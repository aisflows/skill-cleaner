id: ais-flows-skill-library-cleaner
public_name: AIS FLOWS Skill Library Cleaner
brand: AIS FLOWS
version: 0.1.0
status: public-preview
publication_action_executed: true
open_source: false
author: Andrei Spirydovich
summary_ru: "Превращает разрозненные AI-agent skills в чистую, компактную, читаемую библиотеку и рабочие skill-файлы."
summary_en: "Turns scattered AI-agent skills into a clean, compact, readable library and usable skill files."
promise: "scattered AI-agent skills -> clean-library + usable SKILL.md files"
usage_model: "Connect the six-skill pack to an agent chat/session, give it an AI-agent skills folder path, and get skill-library-cleaner-output/clean-library with usable SKILL.md files and a final map while the original source folder stays intact."
compatibility_public_line: "Codex-first. Markdown-portable. Adapter candidates available."
verified_environment:
  - "Codex / OpenAI-style local Markdown/file workflow"
adapter_candidates:
  - "Claude Code"
  - "Claude"
  - "Cursor"
  - "Gemini"
  - "Kimi"
  - "Qwen"
  - "DeepSeek"
  - "Generic Markdown-capable agents"
not_claimed:
  - "verified support for all models"
  - "runtime support outside the tested primary workflow"
  - "automatic install or execution in untested environments"
workflow:
  - step: 1
    name: Inventory
    source_path: skills/inventory/SKILL.md
    output: INVENTORY.md and INVENTORY.json
  - step: 2
    name: Risk Block
    source_path: skills/risk-block/SKILL.md
    output: RISK_BLOCKLIST.md and RISK_BLOCKLIST.json
  - step: 3
    name: Dedupe & Cluster
    source_path: skills/dedupe-cluster/SKILL.md
    output: DEDUP_GROUPS.md and DEDUP_GROUPS.json
  - step: 4
    name: Normalize & Canonicalize
    source_path: skills/normalize-canonicalize/SKILL.md
    output: CANONICAL_LIBRARY_PLAN.md and CANONICAL_LIBRARY_PLAN.json
  - step: 5
    name: Apply & Archive
    source_path: skills/apply-archive/SKILL.md
    output: APPLY_PLAN.md, APPLY_REPORT.md, clean-library, backup, archive
  - step: 6
    name: Verify & Final Map
    source_path: skills/verify-final-map/SKILL.md
    output: FINAL_LIBRARY_MAP.md, FINAL_LIBRARY_MAP.json, VERIFY_REPORT.md
output_contract:
  root: skill-library-cleaner-output
  clean_library: clean-library
  reports: reports
  machine: machine
safety:
  no_permanent_delete: true
  no_install: true
  no_script_execution_from_input: true
  no_provider_api_calls: true
  no_secret_access: true
  apply_requires_approval: true
  apply_requires_machine_approval_state: true
release_decision:
  state: public-preview
  blocker: "Real installed-folder write-run remains outside automatic v0.1.0 behavior."
  next_review: "Optional external SkillTest review of public preview package."
  completed_tests:
    - "fixture full path: messy-small/raw -> clean-library"
    - "model 5.4 mini fixture retest"
    - "real dirty-folder dry-run on C:\\Users\\user\\.codex\\skills"
    - "approved-result-folder-only write simulation on copied dirty folder"
    - "5-point full validation: per-skill, adversarial, skill-audit, static security, weak-model regression"
artifacts:
  required:
    - README.md
    - TERMS.md
    - PRIVACY.md
    - SECURITY.md
    - SUPPORT.md
    - CHANGELOG.md
    - RELEASE_NOTES.md
    - THIRD_PARTY_NOTICES.md
    - ADAPTER_LABELS.md
    - pack.yaml
    - release-manifest.json
    - catalog/skills.csv
    - skills/inventory/SKILL.md
    - skills/risk-block/SKILL.md
    - skills/dedupe-cluster/SKILL.md
    - skills/normalize-canonicalize/SKILL.md
    - skills/apply-archive/SKILL.md
    - skills/verify-final-map/SKILL.md
    - docs/safety.md
    - docs/apply-and-rollback.md
    - docs/compatibility.md
    - site-ready/SITE_BRIEF.md
    - site-ready/SITE_SECTIONS.md
    - site-ready/SITE_DATA.json
    - site-ready/SITE_PRIVACY.md
    - site-ready/SITE_UPDATE_LOG.md
    - docs/output-contract.md
    - docs/package-allowlist.md
    - templates/INVENTORY_TEMPLATE.md
    - templates/RISK_BLOCKLIST_TEMPLATE.md
    - templates/DEDUP_GROUPS_TEMPLATE.md
    - templates/CANONICAL_LIBRARY_PLAN_TEMPLATE.md
    - templates/APPLY_PLAN_TEMPLATE.md
    - templates/FINAL_LIBRARY_MAP_TEMPLATE.md
    - examples/messy-small/raw/duplicate-a/SKILL.md
    - examples/messy-small/raw/duplicate-b/SKILL.md
    - examples/messy-small/raw/keep-good/SKILL.md
    - examples/messy-small/raw/risky-cli/SKILL.md
    - examples/expected-clean-library/EXPECTED_RESULT.md
